name: Release Xuanpu

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-canary.') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download libghostty (optional)
        continue-on-error: true
        id: ghostty
        run: |
          mkdir -p vendor
          gh release download ghostty-deps-v1 -p libghostty.a -D vendor/ --repo slicenferqin/xuanpu
          echo "available=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pip3 install --break-system-packages setuptools
      - run: pnpm install --frozen-lockfile

      - name: Build Ghostty native addon
        if: steps.ghostty.outputs.available == 'true'
        run: pnpm build:native
        env:
          GHOSTTY_LIB_PATH: ${{ github.workspace }}/vendor/libghostty.a

      - run: pnpm build
        env:
          GHOSTTY_LIB_PATH: ${{ steps.ghostty.outputs.available == 'true' && format('{0}/vendor/libghostty.a', github.workspace) || '' }}

      - name: Ensure ghostty.node exists for electron-builder extraResources
        run: |
          # electron-builder.yml references this in extraResources.
          # If ghostty wasn't built, create an empty placeholder so packaging doesn't fail.
          if [ ! -f src/native/build/Release/ghostty.node ]; then
            mkdir -p src/native/build/Release
            touch src/native/build/Release/ghostty.node
            echo "Created placeholder ghostty.node (ghostty not available)"
          else
            echo "ghostty.node exists from native build"
          fi

      - run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing disabled — unsigned build for now.
          # Uncomment below when Apple Developer certificate is configured:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify packaged app contents
        if: always()
        run: |
          echo "=== dist contents ==="
          ls -lh dist/*.dmg dist/*.zip 2>/dev/null || echo "No DMG/ZIP in dist"
          echo "=== .node files in dist ==="
          find dist -name '*.node' 2>/dev/null || echo "No .node files in dist"
